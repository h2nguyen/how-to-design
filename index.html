<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>How-to Design</title>
<style>
:root{
  --bg:#f4f5f7; --surface:#fff; --surface-2:#f7f8fa;
  --border:#e4e6ea; --border-strong:#d2d6dc;
  --text:#1f2430; --muted:#5b6472; --faint:#8a93a2;
  --accent:#1d9e75; --accent-weak:#e1f5ee; --accent-ink:#0f6e56;
  --warn-weak:#faeeda; --warn-ink:#854f0b;
  --danger-weak:#fceaea; --danger-ink:#a32d2d;
  --radius:10px; --radius-lg:14px;
  --nav-w:290px; --aside-w:clamp(320px,30vw,460px);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent-ink)}

/* ---- Grid shell (named areas for easy rearranging) ---- */
.app{
  display:grid;
  grid-template-columns:var(--nav-w) minmax(0,1fr) var(--aside-w);
  grid-template-areas:"nav main aside";
  min-height:100vh;
}
.sidebar{grid-area:nav;background:var(--surface);border-right:1px solid var(--border);height:100vh;position:sticky;top:0;overflow-y:auto}
.main{grid-area:main;min-width:0;height:100vh;overflow-y:auto;scroll-behavior:smooth}
.aside{grid-area:aside;background:var(--surface-2);border-left:1px solid var(--border);height:100vh;position:sticky;top:0;overflow:hidden}

/* ---- Sidebar ---- */
.sidebar-inner{padding:0 14px 40px}
.sb-head{position:sticky;top:0;z-index:5;background:var(--surface);padding:16px 0 8px}
.brand{padding:4px 8px 12px;border-bottom:1px solid var(--border)}
.brand-title{font-size:15px;font-weight:700;letter-spacing:.2px;cursor:pointer}
.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
.all-tracks{display:inline-block;font-size:12px;color:var(--muted);text-decoration:none;padding:0 4px 8px}
.all-tracks:hover{color:var(--accent-ink)}
.app-version{margin-top:18px;padding:10px 8px 0;border-top:1px solid var(--border);font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;letter-spacing:.3px}
.portal-version{margin-top:48px;padding-top:18px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;letter-spacing:.3px}
/* ---- legal footer (Disclaimer · Privacy) — shared by portal + track sidebar ---- */
.legal-foot{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:7px;margin-top:12px;font-size:11px;line-height:1.5}
.app-version .legal-foot{margin-top:10px}
.legal-sep{color:var(--border)}
.legal-item{display:inline-block}
.legal-label{background:none;border:0;font:inherit;color:var(--muted);font-weight:600;cursor:pointer;border-bottom:1px dashed var(--border-strong);padding:0 0 1px;transition:color .15s}
.legal-label:hover,.legal-label[aria-expanded="true"]{color:var(--accent-ink)}
.legal-backdrop{position:fixed;inset:0;background:rgba(20,24,32,.32);z-index:300;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.legal-backdrop.is-open{opacity:1;visibility:visible}
.legal-pop{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(10px);width:min(460px,calc(100vw - 28px));max-height:72vh;overflow:auto;background:var(--surface);color:var(--text);border:1px solid var(--border-strong);border-radius:var(--radius-lg);box-shadow:0 16px 48px rgba(20,24,32,.22);padding:20px 22px 18px;font-size:13px;font-weight:400;line-height:1.62;text-align:left;z-index:301;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,visibility .2s,transform .2s}
.legal-pop.is-open{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.legal-pop strong{font-weight:700;color:var(--text)}
.legal-pop a{color:var(--accent-ink);font-weight:600}
.legal-pop-head{display:block;font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;padding-right:22px}
.legal-x{position:absolute;top:10px;right:12px;background:none;border:0;font-size:20px;line-height:1;color:var(--faint);cursor:pointer;padding:2px 4px}
.legal-x:hover{color:var(--text)}
.portal{max-width:920px;margin:0 auto;padding:44px 24px 90px}
.portal-top{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-bottom:20px}
.portal-top .lang-switch{display:flex;gap:6px;width:auto;margin:0}
.portal h1{font-size:30px;font-weight:700;line-height:1.2;margin:0 0 12px}
.tracks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:12px}
.track-card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);padding:18px 20px;display:flex;flex-direction:column;gap:8px}
.track-card h3{margin:0;font-size:17px;font-weight:700}
.track-card p{margin:0;color:var(--muted);font-size:14px;flex:1;line-height:1.55}
.track-card .cta{align-self:flex-start;margin-top:8px;background:var(--accent);color:#fff;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:600;text-decoration:none}
.track-card.is-soon{opacity:.75}
.track-card.is-soon .cta{background:var(--surface-2);color:var(--faint)}
.lang-switch{display:flex;gap:6px;margin-top:12px}
.lang-btn{flex:1;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:6px 8px;font:inherit;font-size:12px;cursor:pointer;color:var(--muted)}
.lang-btn.is-on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.progress{margin-top:12px;height:6px;background:var(--surface-2);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);width:6%}
.progress-label{font-size:11px;color:var(--faint);margin-top:5px}

.nav{margin-top:6px}
.nav-part{margin-top:13px}
.nav-part-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:4px 8px}
.nav-chapter{display:flex;align-items:flex-start;gap:8px;width:100%;text-align:left;border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;line-height:1.45;padding:7px 8px;border-radius:8px;cursor:pointer}
.nav-chapter:hover{background:var(--surface-2)}
.nav-chapter .num{flex:0 0 22px;height:22px;border-radius:6px;background:var(--surface-2);color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.nav-chapter.is-active{background:var(--accent-weak);color:var(--accent-ink);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.nav-chapter.is-active .num{background:var(--accent);color:#fff}
.nav-chapter.is-soon{color:var(--faint);cursor:not-allowed}
.nav-chapter.is-soon:hover{background:transparent}
.soon-tag{margin-left:auto;font-size:10px;color:var(--faint);border:1px solid var(--border);border-radius:99px;padding:1px 7px}
.nav-topics{margin:2px 0 4px 18px;padding-left:8px;border-left:2px solid var(--border)}
.nav-topic{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--muted);font:inherit;font-size:12.5px;padding:5px 8px;border-radius:6px;cursor:pointer}
.nav-topic:hover{background:var(--surface-2);color:var(--text)}
.nav-topic.is-active{background:var(--accent-weak);color:var(--accent-ink);font-weight:600;box-shadow:inset 2px 0 0 var(--accent)}

/* ---- Main ---- */
.topbar{display:flex;align-items:center;flex-wrap:wrap;gap:12px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:30}
.menu-btn{display:none;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;line-height:1}
.hd-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text);text-decoration:none;padding:4px 7px;border-radius:7px}
.hd-link:hover{background:var(--surface-2);color:var(--accent-ink)}
.hd-link.is-current{background:var(--accent-weak);color:var(--accent-ink)}
.hd-link.hd-dim{color:var(--muted);font-size:12.5px}
.hd-spacer{flex:1}
.lang-dd{position:relative}
.lang-current{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 10px;font:inherit;font-size:13px;cursor:pointer;color:var(--text)}
.lang-current:hover{border-color:var(--accent)}
.lang-current .caret{color:var(--muted);font-size:11px}
.lang-dd .flag{font-size:15px;line-height:1}
.lang-menu{position:absolute;right:0;top:calc(100% + 6px);min-width:172px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:5px;display:none;z-index:50}
.lang-dd.open .lang-menu{display:block}
.lang-opt{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:transparent;font:inherit;font-size:13.5px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text)}
.lang-opt:hover{background:var(--surface-2)}
.lang-opt.is-on{color:var(--accent-ink);font-weight:600;background:var(--accent-weak)}
.tts{display:inline-flex;gap:4px;align-items:center}
.tts-btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 10px;font:inherit;font-size:13px;cursor:pointer;color:var(--text)}
.tts-btn:hover{border-color:var(--accent);color:var(--accent-ink)}
.tts-stop{padding:5px 9px}
.tts-active{background:var(--accent-weak)!important;border-radius:6px;box-shadow:0 0 0 4px var(--accent-weak)}
.theme-dd{position:relative}
.theme-btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:5px 10px;font:inherit;font-size:13px;cursor:pointer;color:var(--text)}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn .caret{color:var(--muted);font-size:11px}
.theme-icon{font-size:14px;line-height:1}
.theme-menu{position:absolute;right:0;top:calc(100% + 6px);min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:5px;display:none;z-index:50}
.theme-dd.open .theme-menu{display:block}
.theme-opt{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:transparent;font:inherit;font-size:13.5px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text)}
.theme-opt:hover{background:var(--surface-2)}
.theme-opt.is-on{color:var(--accent-ink);font-weight:600;background:var(--accent-weak)}
.reset-all{margin-top:12px;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:7px 10px;font:inherit;font-size:12px;color:var(--muted);cursor:pointer;width:100%}
.reset-all:hover{border-color:var(--danger-ink);color:var(--danger-ink)}
.cz-tools{display:flex;align-items:center;gap:10px}
.reset-btn{border:1px solid var(--border);background:var(--surface);border-radius:7px;padding:4px 9px;font:inherit;font-size:11.5px;color:var(--muted);cursor:pointer;white-space:nowrap}
.reset-btn:hover{border-color:var(--accent);color:var(--accent-ink)}
.content{max-width:820px;margin:0 auto;padding:30px 30px 90px}

/* ---- Prose ---- */
.prose h1{font-size:27px;font-weight:700;line-height:1.25;margin:6px 0 14px}
.prose h2{font-size:20px;font-weight:700;margin:30px 0 10px;padding-top:8px;scroll-margin-top:18px}
.prose h3{font-size:16px;font-weight:700;margin:20px 0 8px}
.prose p{margin:11px 0}
.prose ul,.prose ol{margin:10px 0;padding-left:22px}
.prose li{margin:5px 0}
.prose strong{font-weight:700}
.prose code{font-family:var(--mono);font-size:.88em;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 5px}
.prose blockquote{margin:14px 0;padding:10px 16px;border-left:3px solid var(--accent);background:var(--accent-weak);border-radius:0 var(--radius) var(--radius) 0;color:var(--accent-ink)}
.prose blockquote p{margin:4px 0}
.prose table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
.prose th,.prose td{border:1px solid var(--border);padding:8px 10px;text-align:left;vertical-align:top}
.prose thead th{background:var(--surface-2);font-weight:700}
.prose hr{border:0;border-top:1px solid var(--border);margin:26px 0}
.prose details{border:1px solid var(--border);border-radius:var(--radius);margin:10px 0;background:var(--surface);overflow:hidden}
.prose details[open]{border-color:var(--accent)}
.prose summary{cursor:pointer;padding:11px 14px;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:8px;background:var(--surface-2)}
.prose summary::-webkit-details-marker{display:none}
.prose summary::before{content:"\25B6";font-size:10px;color:var(--accent);transition:transform .15s}
.prose details[open] summary::before{transform:rotate(90deg)}
.prose details>:not(summary){padding:0 16px}
.prose details>p:first-of-type{padding-top:12px}
.prose details>p:last-child{padding-bottom:14px}
.prose .story{border:1px solid var(--border);border-left:3px solid var(--accent);background:var(--surface);border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin:18px 0;font-size:14px;line-height:1.6;color:var(--text)}
.prose .story .story-who{display:flex;align-items:center;gap:8px;font-weight:700;font-size:12px;letter-spacing:.2px;color:var(--accent-ink);margin-bottom:7px}
.prose .story .story-ava{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 24px}
.prose .story[data-who="mateo"]{border-left-color:#185fa5}
.prose .story[data-who="mateo"] .story-who{color:#185fa5}
.prose .story[data-who="mateo"] .story-ava{background:#185fa5}
.prose .socratic{border:1px solid #d9d5f6;border-left:3px solid #7f77dd;background:#f4f2fd;border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin:18px 0;font-size:14px;line-height:1.65;color:var(--text)}
.prose .socratic-q{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#4b41a8;margin-right:8px;vertical-align:middle}
.prose .socratic-q::before{content:"?";display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#7f77dd;color:#fff;font-size:12px;font-weight:700;text-transform:none}
.prose details.socratic-reveal{border-color:#c9c3f1}
.prose details.socratic-reveal summary{background:#f4f2fd;color:#4b41a8}
.prose details.socratic-reveal summary::before{color:#7f77dd}
.prose .feynman{border:1px solid #f0dcae;border-left:3px solid #ba7517;background:#fdf6e8;border-radius:0 var(--radius) var(--radius) 0;padding:13px 16px;margin:18px 0;font-size:14px;line-height:1.65;color:var(--text)}
.prose .feynman-lead{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8a5a12;margin-right:8px;vertical-align:middle}
.prose .feynman-lead::before{content:"\1F4A1";font-size:13px}
.prose details.feynman-reveal{border-color:#f0dcae}
.prose details.feynman-reveal summary{background:#fdf6e8;color:#8a5a12}
.prose details.feynman-reveal summary::before{color:#ba7517}
.prose .term{border-bottom:1px dashed #9a93de;cursor:help;position:relative}
.prose .term.term-plain{border-bottom:0;cursor:auto}
.prose .term .tip{position:absolute;left:0;bottom:calc(100% + 8px);width:240px;max-width:70vw;background:#26215c;color:#fff;font-size:12.5px;font-weight:400;line-height:1.5;letter-spacing:normal;text-transform:none;padding:9px 11px;border-radius:8px;opacity:0;visibility:hidden;transition:opacity .12s;z-index:40;box-shadow:0 6px 20px rgba(0,0,0,.18)}
.prose .term:hover .tip,.prose .term:focus .tip,.prose .term:focus-within .tip{opacity:1;visibility:visible}
.prose .term .tip::after{content:"";position:absolute;left:14px;top:100%;border:6px solid transparent;border-top-color:#26215c}
.prose a.xref{color:var(--accent-ink);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.prose .anchor-id{display:block;position:relative;top:-14px;visibility:hidden;height:0}

/* ---- Aside (right-hand visual panel) ---- */
.aside-inner{height:100vh;display:flex;flex-direction:column;justify-content:center;padding:26px 24px;gap:16px}
.aside-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
.scene-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:14px}
.scene-art{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.scene-art svg{width:100%;height:100%}
.scene-cap{font-size:14px;color:var(--text);line-height:1.55}
.scene-fade{animation:sceneIn .35s ease}
@keyframes sceneIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- Chapter footer nav ---- */
.chap-nav{display:flex;justify-content:space-between;gap:12px;margin-top:34px;border-top:1px solid var(--border);padding-top:20px}
.chap-nav a,.chap-nav button{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);padding:12px 16px;font:inherit;font-size:13.5px;cursor:pointer;color:var(--text);max-width:48%;text-align:left;text-decoration:none;display:inline-block}
.chap-nav a:hover{border-color:var(--accent);color:var(--accent-ink)}
.chap-nav .cn-dir{display:block;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.chap-nav .cn-next{text-align:right;margin-left:auto}
.chap-nav .is-disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ---- Coming-soon ---- */
.soon-panel{border:1px dashed var(--border-strong);border-radius:var(--radius-lg);padding:34px;text-align:center;color:var(--muted);background:var(--surface)}
.soon-panel h2{margin-top:0}

/* ---- Home ---- */
.home-hero{padding:8px 0 4px}
.home-hero h1{font-size:30px;font-weight:700;line-height:1.2;margin:0 0 12px}
.home-lead{font-size:16px;color:var(--muted);max-width:62ch}
.home-cta{display:inline-block;background:var(--accent);color:#fff;border:0;border-radius:var(--radius);padding:12px 20px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none}
.home-cta-row{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-top:20px}
.home-cta2{font-size:14px;color:var(--accent-ink);text-decoration:underline;text-underline-offset:2px}
.home-section{margin-top:34px}
.home-section h2{font-size:18px;font-weight:700;margin:0 0 12px}
.syllabus{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.syl-part{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);padding:12px 14px}
.syl-part h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin:0 0 8px;font-weight:700}
.syl-ch{font-size:13px;padding:3px 0;color:var(--text)}
.syl-ch.is-soon{color:var(--faint)}
.home-how{font-size:14px;color:var(--muted);max-width:70ch}

/* ---- Home: intro front-and-centre, tiered with a "read more" ---- */
.home-intro{margin-top:28px}
.home-more{margin-top:18px;border-top:1px solid var(--border);padding-top:10px}
.home-more>summary{cursor:pointer;font-size:14px;font-weight:600;color:var(--accent-ink);list-style:none;padding:6px 0}
.home-more>summary::-webkit-details-marker{display:none}
.home-more>summary::before{content:"▸ ";color:var(--accent)}
.home-more[open]>summary::before{content:"▾ "}
.home-more>summary:hover{text-decoration:underline}
.home-more .prose{margin-top:8px}
.home-more .home-cta-row{margin-top:26px;padding-top:20px;border-top:1px solid var(--border)}

/* resume target highlighted in the left path (home only) — reuses the active-chapter treatment */
.nav-chapter.is-now{background:var(--accent-weak)}
.nav-chapter.is-now .num{background:var(--accent);color:#fff}

/* ---- Widgets ---- */
.ds-widget{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);padding:16px;margin:18px 0}
.w-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-ink);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.w-eyebrow::before{content:"";width:7px;height:7px;border-radius:99px;background:var(--accent)}
.le-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.25fr);gap:14px}
.le-stack{display:flex;flex-direction:column-reverse;gap:6px}
.le-btn{text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:10px 12px;font:inherit;font-size:13.5px;cursor:pointer;color:var(--text)}
.le-btn:hover{background:var(--surface-2)}
.le-btn.is-active{border:2px solid var(--accent);background:var(--accent-weak);color:var(--accent-ink);font-weight:600;padding:9px 11px}
.le-detail{border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:var(--surface-2);min-height:150px}
.le-name{font-weight:700;font-size:14px;margin-bottom:6px}
.le-blurb{font-size:13.5px;color:var(--muted);margin:0 0 12px}
.le-mise{font-size:13px;color:var(--accent-ink);background:var(--accent-weak);border-radius:8px;padding:9px 11px}
.tp-controls{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:14px}
.tp-swatches{display:flex;gap:8px;margin-top:6px}
.tp-sw{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);cursor:pointer;padding:0}
.tp-sw.is-active{outline:2px solid var(--text);outline-offset:2px}
.tp-token{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
.tp-token b{color:var(--text)}
.tp-toggle{display:inline-flex;border:1px solid var(--border);border-radius:99px;overflow:hidden}
.tp-toggle button{border:0;background:var(--surface);font:inherit;font-size:12.5px;padding:7px 13px;cursor:pointer;color:var(--muted)}
.tp-toggle button.is-on{background:var(--accent);color:#fff;font-weight:600}
.tp-stage{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.tp-team{border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;background:var(--surface-2)}
.tp-team .lbl{font-size:11px;color:var(--faint);margin-bottom:9px}
.tp-team .btn{display:inline-block;color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600}
.tp-note{font-size:12.5px;color:var(--muted);margin:6px 2px 0}
.cz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cz-score{font-size:12.5px;color:var(--muted)}
.cz-item{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;background:var(--surface)}
.cz-q{font-size:14px;margin-bottom:9px}
.cz-q code{font-family:var(--mono);font-size:.88em;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:1px 5px}
.cz-opts{display:flex;flex-wrap:wrap;gap:6px}
.cz-opts.cz-vert{flex-direction:column;align-items:stretch}
.cz-ref{margin-left:4px;font-size:12px;white-space:nowrap}
.saga .saga-cover{text-align:center;padding:26px 0 18px;border-bottom:1px solid var(--border);margin-bottom:22px}
.saga .saga-cover .saga-kicker{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--faint)}
.saga .saga-cover h1{font-family:Georgia,"Times New Roman",serif;font-size:32px;margin:8px 0 0;border:0;padding:0}
.saga.prose{font-family:Georgia,"Times New Roman",serif;max-width:720px}
.saga.prose h2{font-family:var(--font);font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent-ink);border-top:1px solid var(--border);padding-top:24px;margin-top:30px;font-weight:700}
.saga.prose h3{font-family:Georgia,serif;font-size:20px;font-weight:700;margin:14px 0 8px}
.saga.prose p{font-size:16.5px;line-height:1.85}
.saga.prose h2{scroll-margin-top:80px}
/* saga episode hero illustration — a framed, lively banner under each ## */
.saga-hero{margin:16px 0 24px;border-radius:var(--radius-lg);background:radial-gradient(120% 120% at 50% 0,var(--surface) 0,var(--surface-2) 100%);border:1px solid var(--border);overflow:hidden}
.saga-hero-art{height:236px;display:flex;align-items:center;justify-content:center;padding:18px 22px}
.saga-hero-art svg{height:100%;width:auto;max-width:100%;display:block}
@media (max-width:880px){.saga-hero-art{height:200px;padding:14px}}
/* saga story table of contents (sidebar) */
.saga-toc-head{margin:4px 8px 10px}
.saga-toc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
.saga-toc-prog{margin-top:8px}
.saga-toc-prog .progress-bar{transition:width .3s ease}
.nav-saga{align-items:center}
.nav-saga>span:last-child{font-size:12.5px;line-height:1.4}
/* saga "now reading" card (right panel) — fixed size so it never jumps */
.saga-aside{justify-content:center}
.saga-now{align-items:center;text-align:center;gap:14px;justify-content:center;padding:22px 20px}
.saga-now-badge{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-family:Georgia,serif;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.saga-now-of{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
.saga-now-titlewrap{min-height:80px;display:flex;align-items:center;justify-content:center;width:100%}
.saga-now-title{font-family:Georgia,serif;font-size:19px;font-weight:700;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.saga-now-prograw{display:flex;align-items:center;gap:10px;width:100%}
.saga-now-prog{flex:1;margin:0}
.saga-now-bar{transition:width .3s ease}
.saga-now-pct{font-size:12px;font-weight:700;color:var(--accent-ink);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
/* floating "back to top" button (all long pages) */
.to-top{position:fixed;bottom:24px;right:calc(var(--aside-w) + 24px);z-index:35;width:42px;height:42px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:20px;line-height:1;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.18);opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .2s,transform .2s}
.to-top:hover{background:var(--surface-2)}
.to-top.is-on{opacity:1;transform:translateY(0);pointer-events:auto}
@media (max-width:1180px){.to-top{right:24px}}
@media (max-width:880px){.to-top{bottom:18px;right:18px}}
.cast{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin:12px 0}
.cast-card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.cast-ava{width:34px;height:34px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:4px}
.cast-card b{font-size:14px}
.cast-card span:last-child{font-size:12.5px;color:var(--muted);line-height:1.55}
.timeline{border-left:2px solid var(--accent-weak);padding-left:20px;margin:14px 0}
.timeline .tl{position:relative;padding:8px 0}
.timeline .tl::before{content:"";position:absolute;left:-27px;top:13px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
.timeline .tl b{display:block;font-size:14px}
.timeline .tl span{font-size:13px;color:var(--muted)}
.bl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.bl-item{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--surface-2);font-size:13px;color:var(--faint)}
.bl-item.is-done{background:var(--accent-weak);color:var(--accent-ink);border-color:var(--accent)}
.bl-mark{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex:0 0 18px;visibility:hidden}
.bl-item.is-done .bl-mark{visibility:visible}
.bl-n{font-weight:700}
.bl-t{flex:1;min-width:0}
/* showcase: the system you built (layer stack) + a live components gallery */
.sc-stack{display:flex;flex-direction:column;gap:6px;margin:16px 0;align-items:center}
.sc-layer{border-radius:9px;padding:9px 14px;color:#fff;font-weight:700;font-size:13px;text-align:center;width:100%;max-width:520px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.sc-layer small{display:block;font-weight:500;font-size:11.5px;opacity:.92;margin-top:2px}
.sc-gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin:16px 0}
.sc-panel{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);padding:14px 16px}
.sc-panel h4{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);border:0;padding:0}
.sc-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sc-btn{border:1px solid transparent;border-radius:8px;padding:8px 14px;font:inherit;font-size:13px;font-weight:600;cursor:default}
.sc-btn.primary{background:var(--accent);color:#fff}
.sc-btn.secondary{background:var(--accent-weak);color:var(--accent-ink)}
.sc-btn.ghost{background:transparent;color:var(--accent-ink);border-color:var(--border)}
.sc-btn.danger{background:#c0362c;color:#fff}
.sc-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600}
/* shape-distinct status — not hue alone (Tariq's rule): each status has its own glyph */
.sc-badge::before{font-weight:900;font-size:10px;line-height:1}
.sc-badge.ok::before{content:"✓"}
.sc-badge.warn::before{content:"▲"}
.sc-badge.err::before{content:"✕"}
.sc-badge.ok{background:#e1f5ee;color:#0f6e56}
.sc-badge.warn{background:#fdf0d8;color:#8a5a00}
.sc-badge.err{background:#fdeceb;color:#c0362c}
.sc-btn.danger::before{content:"▲";font-size:11px;margin-right:6px}
.sc-field{display:flex;flex-direction:column;gap:5px}
.sc-field label{font-size:12px;font-weight:600;color:var(--muted)}
.sc-field input{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font:inherit;font-size:13px;background:var(--surface-2);color:var(--text)}
.sc-table{width:100%;border-collapse:collapse;font-size:12.5px}
.sc-table th,.sc-table td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border)}
.sc-table th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}
/* showcase: live white-label demo — one composed Mise screen, brand switched via scoped tokens */
.wl-switchwrap{display:flex;align-items:center;gap:8px}
.wl-brandlabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint)}
.wl-switch{display:flex;gap:6px;flex-wrap:wrap}
.wl-brand-btn{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:8px;padding:5px 16px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s ease}
.wl-screen{margin-top:14px}
.wl-frame{max-width:420px;margin:0 auto;border:1px solid var(--border);border-radius:calc(var(--wl-radius,10px) + 6px);overflow:hidden;background:var(--surface);box-shadow:0 6px 22px rgba(0,0,0,.12);transition:border-radius .4s ease}
.wl-head{display:flex;align-items:center;gap:8px;background:var(--wl-brand,#1d9e75);color:#fff;padding:11px 14px;transition:background .4s ease}
.wl-logo{width:18px;height:18px;border-radius:5px;background:rgba(255,255,255,.9);flex:none}
.wl-brandname{font-weight:800;letter-spacing:.2px}
.wl-screentitle{font-size:12px;opacity:.92}
.wl-allergy{margin-left:auto}
.wl-table{font-size:12px;font-weight:700;color:var(--wl-ink,#0f6e56);padding:11px 14px 2px;transition:color .4s ease}
.wl-rows{padding:0 14px}
.wl-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.wl-row:last-child{border-bottom:0}
.wl-item{font-weight:600;font-size:13.5px}
.wl-qty{color:var(--muted);font-size:12.5px;min-width:30px}
.wl-fire{margin-left:auto;border:1px solid var(--wl-brand,#1d9e75);color:var(--wl-ink,#0f6e56);background:var(--wl-weak,#e1f5ee);border-radius:var(--wl-radius,10px);padding:5px 16px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .4s ease}
.wl-fire:hover{background:var(--wl-brand,#1d9e75);color:#fff}
.wl-row .sc-badge{margin-left:auto}
.wl-actions{display:flex;gap:8px;padding:14px}
.wl-btn{border:0;border-radius:var(--wl-radius,10px);padding:10px 14px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .4s ease}
.wl-btn.primary{flex:1;background:var(--wl-brand,#1d9e75);color:#fff}
.wl-btn.danger{flex:0 0 auto;background:#fdeceb;color:#c0362c}
.wl-btn.danger::before{content:"▲";font-size:11px;margin-right:6px}
/* showcase · token tiers (Ch13) */
.tt-pick{display:flex;gap:8px;margin:6px 0 14px}
.tt-sw{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;padding:0;transition:transform .15s ease}
.tt-sw:hover{transform:scale(1.08)}
.tt-sw.is-active{border-color:var(--text);box-shadow:0 0 0 2px var(--surface) inset}
.tt-chain{display:flex;flex-direction:column;gap:0;max-width:520px}
.tt-tier{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:10px 12px}
.tt-tag{flex:0 0 96px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--faint)}
.tt-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.tt-name{font-size:12.5px;color:var(--accent-ink);background:var(--surface-2);padding:1px 6px;border-radius:5px;align-self:flex-start}
.tt-res{font-size:11.5px;color:var(--muted)}
.tt-res code{font-size:11px}
.tt-val{width:26px;height:26px;border-radius:6px;flex:none;transition:background .35s ease}
.tt-link{font-size:11px;color:var(--faint);text-align:center;padding:3px 0;position:relative}
.tt-link::before{content:"↓";display:block;font-size:13px;color:var(--accent)}
.tt-preview{display:flex;align-items:center;gap:10px;margin-top:14px}
.tt-prev-lbl{font-size:12px;color:var(--muted)}
.tt-preview .sc-btn{transition:background .35s ease}
/* showcase · theming light/dark (Ch14) */
.th-stage{margin-top:14px;border:1px solid var(--border);border-radius:14px;padding:18px;transition:background .4s ease,border-color .4s ease}
.th-card{border:1px solid;border-radius:12px;padding:16px;max-width:360px;margin:0 auto;transition:border-color .4s ease}
.th-title{font-size:15px;font-weight:800;margin-bottom:6px;transition:color .4s ease}
.th-body{font-size:13px;line-height:1.55;margin-bottom:12px;transition:color .4s ease}
.th-row{display:flex;align-items:center;gap:10px}
.th-btn{border:0;border-radius:8px;padding:8px 16px;font:inherit;font-size:13px;font-weight:700;cursor:default;transition:background .4s ease,color .4s ease}
.th-chip{border:1px solid;border-radius:999px;padding:3px 12px;font-size:12px;font-weight:600;transition:color .4s ease,border-color .4s ease}
/* showcase · component states (Ch16) */
.st-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:6px 0 4px}
.st-cell{display:flex;flex-direction:column;gap:7px;align-items:flex-start}
.st-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--faint)}
.st-btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:8px 16px;font:inherit;font-size:13px;font-weight:700;cursor:default;display:inline-flex;align-items:center;gap:7px}
.st-btn.is-hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.st-btn.is-focus{outline:3px solid var(--accent-weak);outline-offset:2px}
.st-btn.is-active{transform:translateY(1px);filter:brightness(.9)}
.st-btn.is-disabled,.st-btn[disabled]{background:var(--surface-2);border-color:var(--border);color:var(--faint);cursor:not-allowed}
.st-btn.is-loading{opacity:.85;cursor:progress}
.st-spin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;display:inline-block;animation:st-spin .7s linear infinite}
@keyframes st-spin{to{transform:rotate(360deg)}}
/* showcase · contrast checker (Ch4+18) */
.ct-pickers{display:flex;flex-wrap:wrap;gap:18px;margin:6px 0 14px}
.ct-pk-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin-bottom:6px}
.ct-sw{display:flex;gap:6px;flex-wrap:wrap}
.ct-chip{width:26px;height:26px;border-radius:7px;border:2px solid var(--border);cursor:pointer;padding:0;transition:transform .15s ease}
.ct-chip:hover{transform:scale(1.08)}
.ct-chip.is-active{border-color:var(--text);box-shadow:0 0 0 2px var(--surface) inset}
.ct-out{display:flex;flex-wrap:wrap;align-items:center;gap:14px}
.ct-preview{flex:1;min-width:160px;border:1px solid var(--border);border-radius:10px;padding:16px;font-size:18px;font-weight:700;text-align:center}
.ct-ratio{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text)}
.ct-grades{display:flex;flex-direction:column;gap:5px}
.ct-grade{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted)}
.cite{font-size:.72em;font-weight:600;color:var(--accent-ink);text-decoration:none;vertical-align:super;line-height:0;padding:0 1px}
.cite:hover{text-decoration:underline}
.cite-missing{color:var(--danger-ink)}
.refs{margin-top:30px;padding-top:16px;border-top:1px solid var(--border)}
.refs h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);border:0;margin:0 0 10px;padding:0}
.ref-list{margin:0;padding-left:22px}
.ref-list li{font-size:13px;line-height:1.6;color:var(--text);margin:6px 0}
.ref-list li i{font-style:italic}
.ref-link{margin-left:6px;white-space:nowrap;color:var(--accent-ink);text-decoration:none;font-weight:600}
.ref-link:hover{text-decoration:underline}
.cz-opt{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface);border-radius:99px;font:inherit;font-size:12.5px;padding:6px 12px;cursor:pointer;color:var(--text);text-align:left}
.cz-opt:hover:not(:disabled){border-color:var(--accent);color:var(--accent-ink)}
.cz-opt:disabled{cursor:default}
.cz-opt.correct{background:var(--accent-weak);border-color:var(--accent);color:var(--accent-ink);font-weight:700}
.cz-opt.wrong{background:var(--danger-weak);border-color:#e9b7b7;color:var(--danger-ink);text-decoration:line-through}
.cz-feedback{margin-top:9px;font-size:12.5px;padding:8px 10px;border-radius:8px;display:none}
.cz-feedback.show{display:block}
.cz-feedback.ok{background:var(--accent-weak);color:var(--accent-ink)}
.cz-feedback.no{background:var(--warn-weak);color:var(--warn-ink)}
/* ---- Letter badge + text wrapper (all quiz contexts) ---- */
.cz-letter{flex:0 0 24px;height:24px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--surface-2);color:var(--muted);font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .17s,border-color .17s;user-select:none;line-height:1}
.cz-opt-text{flex:1;text-align:left}
/* ---- Gamified quiz: exam-stage dark treatment (cz-game class = vertical/quiz mode) ---- */
/* Teal-family palette — drawn from --accent:#1d9e75 / --accent-ink:#0f6e56 */
.cz-game{background:transparent;border:none;padding:0}
.cz-game .cz-head{background:linear-gradient(90deg,#06231c 0%,#0c4234 100%);border-radius:12px;padding:11px 16px;border:1px solid rgba(61,212,160,.12);margin-bottom:16px}
.cz-game .w-eyebrow{color:#9fe9cf}
.cz-game .w-eyebrow::before{background:#f5b042}
.cz-game .cz-score{font-size:14px;font-weight:800;color:#f5b042;letter-spacing:.4px}
.cz-game .reset-btn{border-color:rgba(245,176,66,.35);background:rgba(245,176,66,.08);color:#f5b042;font-size:11px;padding:5px 11px;border-radius:8px}
.cz-game .reset-btn:hover{border-color:#f5b042;background:rgba(245,176,66,.2);color:#f5b042}
.cz-game .cz-item{background:linear-gradient(160deg,#06231c 0%,#0c4234 100%);border:1px solid rgba(61,212,160,.14);border-radius:16px;padding:24px 20px 20px;margin-bottom:20px;box-shadow:0 8px 32px rgba(2,12,8,.55)}
.cz-game .cz-q{color:#eafaf4;font-size:15.5px;font-weight:600;text-align:center;margin-bottom:20px;line-height:1.55;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.cz-game .cz-q code{background:rgba(61,212,160,.12);border:1px solid rgba(61,212,160,.25);border-radius:5px;padding:2px 6px;color:#9fe9cf;font-family:var(--mono);font-size:.88em}
.cz-game .cz-opts.cz-vert{display:grid;grid-template-columns:1fr 1fr;gap:9px;flex-direction:unset;align-items:stretch}
.cz-game .cz-opt{background:linear-gradient(135deg,rgba(13,66,52,.92) 0%,rgba(16,90,70,.85) 100%);border:1.5px solid rgba(61,212,160,.28);border-radius:11px;padding:12px 16px;color:#eafaf4;font-size:13.5px;font-weight:500;min-height:52px;gap:12px;transition:border-color .17s,background .17s,transform .12s,box-shadow .17s;width:100%}
.cz-game .cz-opt:hover:not(:disabled){border-color:rgba(61,212,160,.6);background:linear-gradient(135deg,rgba(16,90,70,.95) 0%,rgba(20,120,92,.9) 100%);color:#fff;box-shadow:0 0 0 1px rgba(245,176,66,.4),0 4px 18px rgba(61,212,160,.25);transform:translateY(-1px)}
.cz-game .cz-opt:disabled{cursor:default;transform:none}
.cz-game .cz-opt.correct{background:linear-gradient(135deg,#0c4234,#1d9e75);border-color:#3dd4a0;color:#eafaf4;font-weight:700;box-shadow:0 0 0 3px rgba(61,212,160,.2),0 0 22px rgba(61,212,160,.3);animation:cz-pop .38s ease-out}
.cz-game .cz-opt.correct .cz-letter{background:rgba(61,212,160,.25);border-color:#3dd4a0;color:#56e4b2}
.cz-game .cz-opt.wrong{background:linear-gradient(135deg,#3a0f12,#7a1f24);border-color:rgba(245,80,80,.55);color:#fde4e4;opacity:.7}
.cz-game .cz-opt.wrong .cz-letter{background:rgba(245,80,80,.12);border-color:rgba(245,80,80,.3);color:rgba(253,228,228,.4)}
.cz-game .cz-feedback{margin-top:14px;font-size:13px;padding:11px 14px;border-radius:10px;line-height:1.55;font-weight:500}
.cz-game .cz-feedback.ok{background:rgba(61,212,160,.12);color:#56e4b2;border:1px solid rgba(61,212,160,.28)}
.cz-game .cz-feedback.no{background:rgba(245,80,80,.1);color:#ff9b9b;border:1px solid rgba(245,80,80,.22)}
/* Letter badge in game context: warm amber — complementary to teal */
.cz-game .cz-letter{border-color:rgba(245,176,66,.5);background:#f5b042;color:#3a2606;font-size:11.5px;width:26px;height:26px;flex:0 0 26px;font-weight:900}
.cz-game .cz-opt:hover:not(:disabled) .cz-letter{background:#f5c042;border-color:#f5b042}
@keyframes cz-pop{0%{transform:scale(1)}40%{transform:scale(1.03)}70%{transform:scale(.98)}100%{transform:scale(1)}}
/* ---- Inline animated figure blocks ---- */
.ex-fig{max-width:420px;margin:18px auto;text-align:center}
.ex-fig svg{width:100%;height:auto;display:block}
.ex-fig figcaption{font-size:12px;color:var(--muted);margin-top:6px}

:root[data-theme="dark"]{

  --border:#2c3650; --border-strong:#3d4e6e;

    --border:#2c3650; --border-strong:#3d4e6e;

    --accent:#3dd4a0; --accent-weak:#0c3325; --accent-ink:#56e4b2;
    --warn-weak:#2a1c00; --warn-ink:#f0ab38;
    --danger-weak:#2a0c0c; --danger-ink:#f07878;

@media (max-width:1180px){
  .app{grid-template-columns:var(--nav-w) minmax(0,1fr);grid-template-areas:"nav main"}
  .aside{display:none}
}

  .app{grid-template-columns:1fr;grid-template-areas:"main"}
  .sidebar{position:fixed;z-index:40;left:0;top:0;width:var(--nav-w);transform:translateX(-100%);transition:transform .2s}
  .sidebar.is-open{transform:translateX(0);box-shadow:0 0 0 100vmax rgba(0,0,0,.35)}
  .menu-btn{display:inline-flex}
  .le-grid{grid-template-columns:1fr}
  .tp-stage{grid-template-columns:1fr}
  .content{padding:22px 18px 80px}
}

<script>window.APP_VERSION="1.2.0";</script>
<script>

(function(){
  var I = JSON.parse(document.getElementById('portal-i18n').textContent);
  var LANGS = Object.keys(I);
  function gp(k){ var m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):null; }
  function ls(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
  function lg(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
  var lang = gp('lang') || lg('ds.lang') || (LANGS.indexOf('de')>=0?'de':LANGS[0]);
  if(LANGS.indexOf(lang)<0) lang=LANGS[0];
  ls('ds.lang',lang);
  var theme = lg('ds.theme') || 'system';
  function applyTheme(t){ if(t==='dark') document.documentElement.setAttribute('data-theme','dark'); else if(t==='light') document.documentElement.setAttribute('data-theme','light'); else document.documentElement.removeAttribute('data-theme'); }
  applyTheme(theme);
  if(window.matchMedia){ try{ window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){ if(!lg('ds.theme')||lg('ds.theme')==='system') applyTheme('system'); }); }catch(e){} }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function legalHTML(L){
    if(!L) return '';
    function item(label, inner, cls){
      return '<span class="legal-item"><button class="legal-label" type="button" aria-expanded="false">'+esc(label)+'</button>'+
        '<span class="legal-pop'+(cls?' '+cls:'')+'" role="dialog" aria-modal="true">'+
        '<button class="legal-x" type="button" aria-label="\u00d7">\u00d7</button>'+inner+'</span></span>';
    }
    var gh='https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement';
    var dis=item(L.disclaimer, '<span class="legal-pop-head">'+esc(L.disclaimer)+'</span>'+(L.disclaimerBody||''));
    var pri=item(L.privacy, '<span class="legal-pop-head">'+esc(L.privacyHeading)+'</span>'+(L.privacyBody||'')+'<a href="'+gh+'" target="_blank" rel="noopener">'+esc(L.privacyLink)+'</a>.');
    var sep='<span class="legal-sep">\u00b7</span>';
    return '<div class="legal-foot">'+dis+sep+pri+'</div>';
  }
  function legalClose(){
    var ps=document.querySelectorAll('.legal-pop.is-open'); for(var i=0;i<ps.length;i++) ps[i].classList.remove('is-open');
    var bs=document.querySelectorAll('.legal-label[aria-expanded="true"]'); for(var j=0;j<bs.length;j++) bs[j].setAttribute('aria-expanded','false');
    var bd=document.querySelector('.legal-backdrop'); if(bd) bd.classList.remove('is-open');
  }
  function legalWire(root){
    var foot=root.querySelector('.legal-foot'); if(!foot) return;
    var bd=document.querySelector('.legal-backdrop');
    if(!bd){ bd=document.createElement('div'); bd.className='legal-backdrop'; document.body.appendChild(bd); bd.addEventListener('click',legalClose); }
    if(!window.__legalEsc){ window.__legalEsc=1; document.addEventListener('keydown',function(e){ if(e.key==='Escape') legalClose(); }); }
    var stale=document.querySelectorAll('body > .legal-pop'); for(var s=0;s<stale.length;s++) stale[s].remove();
    var items=foot.querySelectorAll('.legal-item');
    for(var i=0;i<items.length;i++){ (function(it){
      var btn=it.querySelector('.legal-label'), pop=it.querySelector('.legal-pop'), x=it.querySelector('.legal-x');
      document.body.appendChild(pop);
      btn.addEventListener('click',function(e){ e.stopPropagation(); var open=pop.classList.contains('is-open'); legalClose(); if(!open){ pop.classList.add('is-open'); btn.setAttribute('aria-expanded','true'); var b=document.querySelector('.legal-backdrop'); if(b) b.classList.add('is-open'); } });
      if(x) x.addEventListener('click',function(e){ e.stopPropagation(); legalClose(); });
      pop.addEventListener('click',function(e){ e.stopPropagation(); });
    })(items[i]); }
  }
  function buildPortalThemeDd(){
    var dd=document.getElementById('portal-theme-dd'); if(!dd) return;
    var tOpts=[{id:'light',icon:'☀'},{id:'system',icon:'⊙'},{id:'dark',icon:'☾'}];
    var cur=tOpts.filter(function(o){return o.id===theme;})[0]||tOpts[1];
    var html='<button class="theme-btn" id="portal-theme-btn" aria-haspopup="true" aria-expanded="false">'+
      '<span class="theme-icon">'+cur.icon+'</span><span class="caret" aria-hidden="true">▾</span></button>'+
      '<div class="theme-menu" role="menu">';
    tOpts.forEach(function(o){ html+='<button class="theme-opt'+(o.id===theme?' is-on':'')+'" data-t="'+o.id+'"><span class="theme-icon">'+o.icon+'</span></button>'; });
    html+='</div>';
    dd.innerHTML=html;
    dd.querySelector('#portal-theme-btn').addEventListener('click',function(e){ e.stopPropagation(); var open=dd.classList.toggle('open'); this.setAttribute('aria-expanded',open?'true':'false'); });
    dd.querySelectorAll('.theme-opt').forEach(function(o){ o.addEventListener('click',function(e){ e.stopPropagation(); dd.classList.remove('open'); theme=o.getAttribute('data-t'); ls('ds.theme',theme); applyTheme(theme); buildPortalThemeDd(); }); });
  }
  document.addEventListener('click',function(){ var d=document.getElementById('portal-theme-dd'); if(d) d.classList.remove('open'); });
  function render(){
    var t=I[lang];
    var h='<div class="portal-top">'+
      '<div class="theme-dd" id="portal-theme-dd"></div>'+
      '<div class="lang-switch">';
    LANGS.forEach(function(c){ h+='<button class="lang-btn'+(c===lang?' is-on':'')+'" data-l="'+c+'"><span style="margin-right:6px">'+esc(I[c].flag||'')+'</span>'+esc(I[c].name)+'</button>'; });
    h+='</div></div>';
    h+='<h1>'+esc(t.title)+'</h1><p class="home-lead">'+esc(t.tagline)+'</p>';
    h+='<h2 class="home-section" style="margin-top:30px">'+esc(t.tracksHeading)+'</h2><div class="tracks-grid">';
    t.tracks.forEach(function(tr){
      if(tr.available){
        h+='<div class="track-card"><h3>'+esc(tr.title)+'</h3><p>'+esc(tr.blurb)+'</p><a class="cta" href="tracks/'+tr.id+'/index.html?lang='+lang+'">'+esc(t.start)+' →</a></div>';
      } else {
        h+='<div class="track-card is-soon"><h3>'+esc(tr.title)+'</h3><p>'+esc(tr.blurb)+'</p><span class="cta">'+esc(t.soon)+'</span></div>';
      }
    });
    h+='</div>';
    h+='<footer class="portal-version">';
    if(window.APP_VERSION){ h+='<div><span title="'+esc(t.version||'Version')+'">v'+esc(window.APP_VERSION)+'</span></div>'; }
    h+=legalHTML(t.legal);
    h+='</footer>';
    document.getElementById('portal').innerHTML=h;
    document.querySelectorAll('#portal .lang-btn').forEach(function(b){
      b.addEventListener('click',function(){ lang=b.getAttribute('data-l'); ls('ds.lang',lang); try{history.replaceState(null,'',location.pathname+'?lang='+lang);}catch(e){} render(); });
    });
    legalWire(document.getElementById('portal'));
    buildPortalThemeDd();
  }
  render();
})();
